name: build-postgres-pgvector

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/pg16-vector
  PGVECTOR_VERSION: v0.8.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            PGVECTOR_VERSION=${{ env.PGVECTOR_VERSION }}
          push: true
          tags: |
            ${{ env.IMAGE }}:16
            ${{ env.IMAGE }}:16-pgvector-${{ env.PGVECTOR_VERSION }}
          provenance: false
          sbom: false
          labels: ''
